services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cockpit-frontend
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_PORT=5174
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cockpit-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cockpit_db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: cockpit-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cockpit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

volumes:
  postgres_data:
