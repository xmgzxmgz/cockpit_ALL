# Cockpit Database Docker Compose Configuration
# 仅运行 PostgreSQL 数据库在 Docker 中，系统本身不在 Docker 中运行

services:
  db:
    image: postgres:15-alpine
    container_name: cockpit-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cockpit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/room_layout_schema.sql:/docker-entrypoint-initdb.d/room_layout_schema.sql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cockpit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local